<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Support | Qualitative AI Interview Studio</title>
    <link rel="stylesheet" href="/frontend/styles.css?v=2026-04-29-1" />
  </head>
  <body data-page="support">
    <div class="site-shell">
      <header class="site-header" data-site-header></header>

      <main class="page page--support">
        <section class="content-grid content-grid--two">
          <article class="panel-card">
            <span class="panel-card__label">Support Request</span>
            <h2>Create a support request</h2>
            <form id="support-ticket-form" class="stack-form">
              <label>
                Customer name
                <input type="text" name="customer_name" autocomplete="name" required />
              </label>
              <label>
                Customer email
                <input type="email" name="customer_email" autocomplete="email" required />
              </label>
              <label>
                Product area
                <input type="text" name="product_area" value="Research workspace" required />
              </label>
              <div class="form-grid form-grid--two">
                <label>
                  Category
                  <select name="category">
                    <option value="research-workflow">Research workflow</option>
                    <option value="bug">Bug</option>
                    <option value="account">Account</option>
                    <option value="billing">Billing</option>
                    <option value="feature">Feature request</option>
                    <option value="other">Other</option>
                  </select>
                </label>
                <label>
                  Priority
                  <select name="priority">
                    <option value="normal">Normal</option>
                    <option value="low">Low</option>
                    <option value="high">High</option>
                    <option value="urgent">Urgent</option>
                  </select>
                </label>
              </div>
              <label>
                Subject
                <input type="text" name="subject" required />
              </label>
              <label>
                Description
                <textarea name="description" rows="7" required></textarea>
              </label>
              <button class="button button--primary" type="submit">Submit request</button>
            </form>
            <div id="support-ticket-output" class="message-box">No request submitted yet.</div>
          </article>

          <article class="panel-card support-agent-panel">
            <span class="panel-card__label">Support Response</span>
            <h2>What happens next</h2>
            <div class="support-steps">
              <span>Submit</span>
              <span>Review</span>
              <span>Reply</span>
            </div>
            <div id="support-agent-result" class="stack-list">
              <p class="muted-copy">Your support response will appear after you submit a request.</p>
            </div>
          </article>
        </section>
      </main>
    </div>

    <script src="/frontend/app.js?v=2026-04-29-1" type="module"></script>
  </body>
</html>
