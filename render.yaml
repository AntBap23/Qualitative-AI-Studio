services:
  - type: web
    name: qualitative-ai-interview-studio-api
    runtime: python
    plan: free
    healthCheckPath: /health
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: STORAGE_BACKEND
        value: supabase
      - key: LOCAL_STORAGE_ROOT
        value: backend_data
      - key: CORS_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AUTH_COOKIE_SECURE
        value: "true"
      - key: AUTH_COOKIE_SAMESITE
        value: "lax"
      - key: MAX_UPLOAD_BYTES
        value: "5242880"
      - key: AUTH_RATE_LIMIT_ATTEMPTS
        value: "8"
      - key: AUTH_RATE_LIMIT_WINDOW_SECONDS
        value: "300"
